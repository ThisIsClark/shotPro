name: Deployment Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run Core Tests
      run: |
        # Ensure scripts use PYTHONPATH=. to find modules
        export PYTHONPATH=$PYTHONPATH:.
        python test_core.py
        python test_import.py

    - name: Run Phase Detector Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python test_phase_detector_optimization.py
        
    - name: Run Template Logic Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python test_template_comparison_flow.py
        python test_template_load.py

    - name: Run Landmark Fix Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python test_landmark_fixes.py
